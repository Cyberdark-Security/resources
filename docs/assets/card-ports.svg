<svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200" role="img" aria-label="Network Ports Reference">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#0f2942"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="r"><rect width="340" height="200" rx="14" ry="14"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="340" height="200" fill="url(#bg)"/>
    <text x="24" y="42" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">Puertos</text>
    <text x="24" y="68" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#94a3b8">TCP/UDP · Nmap · firewall</text>
    <g font-family="Consolas, monospace" font-size="13" font-weight="600">
      <rect x="24" y="88" width="58" height="26" rx="5" fill="#1e293b" stroke="#ef4444" stroke-opacity="0.6"/>
      <text x="34" y="106" fill="#ef4444">:21</text>
      <rect x="84" y="88" width="58" height="26" rx="5" fill="#1e293b" stroke="#22c55e" stroke-opacity="0.6"/>
      <text x="96" y="106" fill="#22c55e">:22</text>
      <rect x="156" y="88" width="58" height="26" rx="5" fill="#1e293b" stroke="#22d3ee" stroke-opacity="0.6"/>
      <text x="168" y="106" fill="#22d3ee">:443</text>
      <rect x="24" y="124" width="78" height="26" rx="5" fill="#1e293b" stroke="#a78bfa" stroke-opacity="0.6"/>
      <text x="34" y="142" fill="#a78bfa">:3389</text>
      <rect x="106" y="124" width="90" height="26" rx="5" fill="#1e293b" stroke="#fbbf24" stroke-opacity="0.6"/>
      <text x="114" y="142" fill="#fbbf24">nmap -sV</text>
    </g>
  <!-- network nodes -->
    <g fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.5" filter="url(#glow)">
      <circle cx="270" cy="95" r="6" fill="#22d3ee"/>
      <circle cx="300" cy="130" r="5" fill="#7c3aed"/>
      <circle cx="250" cy="155" r="5" fill="#22c55e"/>
      <line x1="270" y1="95" x2="300" y2="130"/>
      <line x1="300" y1="130" x2="250" y2="155"/>
      <line x1="250" y1="155" x2="270" y2="95"/>
    </g>
    <rect x="0" y="196" width="340" height="4" fill="#22d3ee" opacity="0.7"/>
  </g>
</svg>
