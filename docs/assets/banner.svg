<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="280" viewBox="0 0 1100 280" role="img" aria-label="Recursos Técnicos  Cyberdark Security">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="55%" stop-color="#12101c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0"/>
      <stop offset="35%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="65%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="round">
      <rect x="0" y="0" width="1100" height="280" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1100" height="280" fill="url(#bg)"/>
    <rect width="1100" height="280" fill="url(#bg)" opacity="0.4"/>

    <!-- subtle grid -->
    <g opacity="0.06" stroke="#7c3aed" stroke-width="1">
      <line x1="0" y1="70" x2="1100" y2="70"/>
      <line x1="0" y1="140" x2="1100" y2="140"/>
      <line x1="0" y1="210" x2="1100" y2="210"/>
      <line x1="220" y1="0" x2="220" y2="280"/>
      <line x1="440" y1="0" x2="440" y2="280"/>
      <line x1="660" y1="0" x2="660" y2="280"/>
      <line x1="880" y1="0" x2="880" y2="280"/>
    </g>

    <!-- Title block -->
    <text x="48" y="118" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="url(#titleGrad)">resources</text>
    <text x="50" y="162" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#94a3b8">Linux · Redes · Pentesting · Cheat Sheets</text>
    <text x="50" y="198" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" font-weight="400" fill="#64748b">Cyberdark Security  referencia técnica para sysadmins y seguridad</text>

  <!-- Abstract graphic: chaos ’ focus ’ structure -->
    <g transform="translate(620, 40)">
      <!-- chaos loops left -->
      <g opacity="0.85" fill="none" stroke-width="2.2" filter="url(#glow)">
        <path d="M40 100 C 20 60, 80 20, 120 50 C 160 80, 100 120, 140 150" stroke="#ef4444"/>
        <path d="M60 160 C 30 130, 70 80, 110 90 C 150 100, 130 150, 170 130" stroke="#22c55e"/>
        <path d="M20 120 C 50 90, 90 130, 130 110 C 170 90, 150 170, 190 150" stroke="#3b82f6"/>
        <path d="M80 60 C 110 40, 130 80, 160 70 C 190 60, 180 110, 210 100" stroke="#eab308"/>
        <path d="M50 190 C 80 170, 100 200, 130 180 C 160 160, 140 220, 180 200" stroke="#a855f7"/>
      </g>

      <!-- convergence glow -->
      <circle cx="248" cy="120" r="28" fill="#ffffff" opacity="0.12" filter="url(#softGlow)"/>
      <circle cx="248" cy="120" r="6" fill="#ffffff" filter="url(#glow)"/>

      <!-- structured beams right -->
      <g stroke-width="2.5" filter="url(#glow)">
        <line x1="254" y1="120" x2="340" y2="55" stroke="#ef4444" opacity="0.9"/>
        <line x1="254" y1="120" x2="340" y2="85" stroke="#f59e0b" opacity="0.9"/>
        <line x1="254" y1="120" x2="340" y2="115" stroke="#22c55e" opacity="0.9"/>
        <line x1="254" y1="120" x2="340" y2="145" stroke="#22d3ee" opacity="0.9"/>
        <line x1="254" y1="120" x2="340" y2="175" stroke="#7c3aed" opacity="0.9"/>
        <line x1="254" y1="120" x2="340" y2="205" stroke="#ec4899" opacity="0.9"/>
      </g>

      <!-- terminal grid -->
      <g font-family="Consolas, Monaco, monospace" font-size="11" font-weight="600">
        <rect x="348" y="48" width="52" height="22" rx="4" fill="#1e1b2e" stroke="#ef4444" stroke-opacity="0.5"/>
        <text x="356" y="64" fill="#ef4444">:21</text>
        <rect x="348" y="78" width="52" height="22" rx="4" fill="#1e1b2e" stroke="#f59e0b" stroke-opacity="0.5"/>
        <text x="356" y="94" fill="#f59e0b">:22</text>
        <rect x="348" y="108" width="52" height="22" rx="4" fill="#1e1b2e" stroke="#22c55e" stroke-opacity="0.5"/>
        <text x="356" y="124" fill="#22c55e">:80</text>
        <rect x="348" y="138" width="52" height="22" rx="4" fill="#1e1b2e" stroke="#22d3ee" stroke-opacity="0.5"/>
        <text x="356" y="154" fill="#22d3ee">:443</text>
        <rect x="348" y="168" width="52" height="22" rx="4" fill="#1e1b2e" stroke="#7c3aed" stroke-opacity="0.5"/>
        <text x="356" y="184" fill="#a78bfa">:3389</text>
        <rect x="348" y="198" width="52" height="22" rx="4" fill="#1e1b2e" stroke="#ec4899" stroke-opacity="0.5"/>
        <text x="356" y="214" fill="#f472b6">nmap</text>
      </g>

      <!-- scan line accent -->
      <rect x="0" y="0" width="420" height="240" fill="url(#beam)" opacity="0.08"/>
    </g>

    <!-- bottom accent line -->
    <rect x="48" y="248" width="180" height="3" rx="1.5" fill="url(#beam)" opacity="0.8"/>
  </g>
</svg>
