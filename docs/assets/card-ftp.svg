<svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200" role="img" aria-label="FTP Cheat Sheet">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f14"/>
      <stop offset="100%" stop-color="#2d1b3d"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="r"><rect width="340" height="200" rx="14" ry="14"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="340" height="200" fill="url(#bg)"/>
    <text x="24" y="42" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">FTP</text>
    <text x="24" y="68" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#94a3b8">transferencias Ṗ SFTP Ṗ pentest</text>
    <g font-family="Consolas, monospace" font-size="12">
      <text x="24" y="105" fill="#f472b6" filter="url(#glow)">ftp&gt; get archivo</text>
      <text x="24" y="128" fill="#fb923c">ftp&gt; put backup.zip</text>
      <text x="24" y="151" fill="#34d399">ftp&gt; binary</text>
      <text x="24" y="174" fill="#94a3b8">ftp&gt; bye</text>
    </g>
    <!-- upload arrow -->
    <g transform="translate(255, 85)" fill="none" stroke="#f472b6" stroke-width="2.5" filter="url(#glow)">
      <path d="M30 70 L30 20 M30 20 L15 35 M30 20 L45 35"/>
      <rect x="10" y="72" width="40" height="28" rx="4" stroke="#a78bfa" fill="#1e1b2e"/>
    </g>
    <rect x="24" y="88" width="120" height="18" rx="3" fill="#ef4444" opacity="0.15"/>
    <text x="28" y="102" font-family="Segoe UI, sans-serif" font-size="10" fill="#fca5a5">  texto claro  usa SFTP</text>
    <rect x="0" y="196" width="340" height="4" fill="#f472b6" opacity="0.7"/>
  </g>
</svg>
