<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200" role="img" aria-label="Linux Cheat Sheet">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <clipPath id="r"><rect width="340" height="200" rx="14" ry="14"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="340" height="200" fill="url(#bg)"/>
    <text x="24" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">Linux</text>
    <text x="24" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#94a3b8">29 secciones | terminal</text>
    <g font-family="Consolas, monospace" font-size="12" fill="#22d3ee">
      <text x="24" y="105">$ ls -lah</text>
      <text x="24" y="128" fill="#a78bfa">$ systemctl status</text>
      <text x="24" y="151" fill="#34d399">$ grep -r pattern .</text>
      <text x="24" y="174" fill="#fbbf24">$ ssh user@host</text>
    </g>
    <circle cx="290" cy="100" r="50" fill="#7c3aed" opacity="0.15"/>
    <text x="268" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#c4b5fd">$_</text>
    <rect x="0" y="196" width="340" height="4" fill="#7c3aed" opacity="0.7"/>
  </g>
</svg>
